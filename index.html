        /* --- TELA DE LOGIN --- */
        #login-overlay { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);

        }
        .login-box {

            width: 100%; max-width: 400px; text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .login-box img { width: 150px; margin-bottom: 20px; border-radius: 12px; }
        .login-box h2 { color: var(--primary); margin-bottom: 10px; font-weight: 800; font-size: 24px; }
        .login-box input {

            border-radius: 10px; font-size: 16px; background: #f1f5f9; transition: 0.3s;
        }
        .login-box button { 
            width: 100%; padding: 14px; background: var(--secondary); color: white; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; 
            font-size: 16px; margin-top: 15px; transition: 0.3s;

        .nav-logo h3 { font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .menu-item:hover, .menu-item.active { background: #1e293b; color: white; border-left: 4px solid var(--secondary); }

        .stat-card p { font-size: 28px; font-weight: 700; color: var(--primary); }
