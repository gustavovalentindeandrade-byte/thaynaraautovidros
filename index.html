<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Pro - Gestão de Estoque</title>
    <!-- Fontes e Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-main: #f8fafc;
            --bg-sidebar: #0f172a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* --- TELA DE LOGIN PROFISSIONAL --- */
        #login-overlay {
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: var(--white); padding: 2.5rem; border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header i { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }
        .login-card input {
            width: 100%; padding: 0.8rem; margin-bottom: 1rem;
            border: 1px solid var(--border); border-radius: 0.5rem; outline: none; transition: 0.2s;
        }
        .login-card input:focus { border-color: var(--primary); ring: 2px var(--primary); }
        .login-card button {
            width: 100%; padding: 0.8rem; background: var(--primary); color: white;
            border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .login-card button:hover { background: var(--primary-hover); }

        /* --- SIDEBAR --- */
        aside {
            width: 260px; background: var(--bg-sidebar); color: white;
            display: flex; flex-direction: column; padding: 1.5rem;
        }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 1.25rem; font-weight: 700; margin-bottom: 2.5rem; color: #fff; }
        .brand i { color: var(--primary); }
        
        .nav-link {
            display: flex; align-items: center; gap: 12px; padding: 0.8rem 1rem;
            color: #94a3b8; text-decoration: none; border-radius: 0.5rem;
            margin-bottom: 0.5rem; transition: 0.3s; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { background: #1e293b; color: #fff; }
        .nav-link.active i { color: var(--primary); }

        /* --- ÁREA PRINCIPAL --- */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        header {
            height: 70px; background: var(--white); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 2rem;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logo-box { text-align: right; line-height: 1.2; }
        .logo-box img { height: 40px; width: auto; border-radius: 4px; }
